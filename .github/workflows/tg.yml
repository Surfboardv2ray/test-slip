name: TG
on:
  push:
    paths:
      - 'tg/channels.json'
      - '.github/workflows/tg.yml'

  workflow_dispatch:
  schedule:
    - cron: "*/59 * * * *"
jobs:
  run_python_and_push:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Parser
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Replace Channels
      run: |
        cp tg/channels.json tg/ch.json
        > tg/config.txt

    - name: Install Parser dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tg/requirements.txt
        

    - name: Run Parser
      env:
          THRD_PARS: '128'
          PARS_DP: '10'
          USE_INV_TC: 'n'
      run: |
        python tg/tg.py
          
    - name: Local Authentication
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"

    - name: Commit & push Parser
      run: |
        git add .
        timestamp=$(TZ='Asia/Tehran' date)
        git commit -m "✅List updated ${timestamp}"
        git pull
        git push
